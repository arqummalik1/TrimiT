    <script>
        // Tab Navigation Logic
        function openTopic(evt, topicId) {
            // Hide all sections
            let sections = document.getElementsByClassName("topic-section");
            for (let i = 0; i < sections.length; i++) {
                sections[i].classList.remove("active");
            }

            // Remove active class from all buttons
            let tablinks = document.getElementsByClassName("tab-link");
            for (let i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }

            // Show current section and activate button
            document.getElementById(topicId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Accordion / Clinical Pearls Logic
        function togglePearl(button) {
            button.classList.toggle("active");
            let content = button.nextElementSibling;
            let icon = button.querySelector('span');

            if (content.style.maxHeight) {
                content.style.maxHeight = null;
                content.style.padding = "0 20px";
                icon.textContent = "+";
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
                content.style.padding = "15px 20px";
                icon.textContent = "-";
            }
        }

        // Flashcard Flip Logic
        function flipCard(card) {
            card.classList.toggle('flipped');
        }
    </script>
