<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive JS Revision</title>
    <style>
        :root {
            --bg-color: #f9fafb;
            --surface-color: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border-color: #e5e7eb;
            --accent-color: #000000;
            --badge-beginner-bg: #dcfce7;
            --badge-beginner-text: #166534;
            --badge-next-bg: #dbeafe;
            --badge-next-text: #1e40af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: 80px;
            /* Space for fixed header */
        }

        /* Glassmorphism Sticky Header */
        .glass-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        /* Horizontally Scrollable Tab Bar */
        .nav-container {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            overflow-x: auto
                <pre><code><span class="keyword">let</span> user = {
    name: <span class="string">"John"</span>,
    age: <span class="string">30</span>,
    role: <span class="string">"Dev"</span>
};

<span class="comment">// Extract variables directly from object</span>
<span class="keyword">const</span> { name, role } = user;
console.<span class="function">log</span>(name, role); <span class="comment">// John Dev</span></code></pre>
            </div>
        </section>

    </main>

    <script>
        function openTopic(evt, topicId) {
            // Hide all sections
            const sections = document.getElementsByClassName("topic-section");
            for (let i = 0; i < sections.length; i++) {
                sections[i].classList.remove("active");
                // Reset animation
                sections[i].style.animation = 'none';
                sections[i].offsetHeight; // Trigger reflow
                sections[i].style.animation = null;
            }

            // Remove active class from all tabs
            const tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }

            // Show current section and activate tab
            document.getElementById(topicId).classList.add("active");
            evt.currentTarget.classList.add("active");

            // Auto-scroll the tab bar to keep the clicked tab visible
            evt.currentTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            // Scroll to top of content smoothly
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
